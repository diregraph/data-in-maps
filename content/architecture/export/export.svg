  </text>

  <!-- ── Branch: useExport → row 3 ── -->
  <line x1="340" y1="156" x2="340" y2="180"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" />
  <line x1="122" y1="180" x2="558" y2="180"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" />
  <line x1="122" y1="180" x2="122" y2="200"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" />
  <line x1="340" y1="180" x2="340" y2="200"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" />
  <line x1="558" y1="180" x2="558" y2="200"

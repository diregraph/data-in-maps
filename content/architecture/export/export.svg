<svg width="680" height="430" viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg"
  style="font-family: 'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif;">

  <!-- Background -->
  <rect x="0" y="0" width="680" height="430" fill="#1a1916" />

  <!-- ── Row 1: ExportPanel ── -->
  <rect x="190" y="28" width="300" height="44" rx="8"
    fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5" />
  <text x="340" y="44" text-anchor="middle" dominant-baseline="central"
    fill="rgb(206,203,246)" font-size="14" font-weight="500">
    ExportPanel
  </text>
  <text x="340" y="62" text-anchor="middle" dominant-baseline="central"
    fill="rgb(175,169,236)" font-size="11">

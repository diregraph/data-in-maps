  </text>

  <!-- ── Connector: ExportPanel → useExport ── -->
  <line x1="340" y1="72" x2="340" y2="100"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" />

  <!-- ── Dashed path: ExportPanel → api-route (right side) ── -->
  <path d="M 490 50 L 628 50 L 628 336 L 490 336"
    fill="none" stroke="rgba(222,220,209,0.3)" stroke-width="1" stroke-dasharray="4 3" />

  <!-- ── Row 2: useExport ── -->
  <rect x="190" y="100" width="300" height="56" rx="8"

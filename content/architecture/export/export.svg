  <!-- ── Legend ── -->
  <rect x="28"  y="392" width="10" height="10" rx="2" fill="rgb(60,52,137)" />
  <text x="44"  y="397" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">entry component</text>

  <rect x="188" y="392" width="10" height="10" rx="2" fill="rgb(8,80,65)" />
  <text x="204" y="397" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">client-side export</text>

  <rect x="360" y="392" width="10" height="10" rx="2" fill="rgb(68,68,65)" />
  <text x="376" y="397" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">server-side route</text>

  <text x="510" y="397" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">╌╌ direct call</text>


  <rect x="140" y="342" width="10" height="10" rx="2" fill="rgb(60,52,137)" />
  <text x="156" y="347" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">entry component</text>

  <rect x="300" y="342" width="10" height="10" rx="2" fill="rgb(8,80,65)" />
  <text x="316" y="347" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">state / hooks</text>

  <text x="450" y="347" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">╌╌ type dependency</text>


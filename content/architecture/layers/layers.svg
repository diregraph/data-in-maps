<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg"
  style="font-family: 'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif;">

  <!-- Background -->
  <rect x="0" y="0" width="680" height="360" fill="#1a1916" />

  <!-- ── Row 1: types ── -->
  <rect x="240" y="28" width="200" height="44" rx="8"
    fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5" />
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central"
    fill="rgb(211,209,199)" font-size="14" font-weight="500">
    types.ts
  </text>
  <text x="340" y="67" text-anchor="middle" dominant-baseline="central"
    fill="rgb(180,178,169)" font-size="11">
    Layer · LayerEncoding · EncodingType
  </text>

  <!-- ── Branch: types → row 2 ── -->
  <!-- vertical stem -->
  <line x1="340" y1="72" x2="340" y2="92"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" stroke-dasharray="3 3" />
  <!-- horizontal bus -->
  <line x1="96" y1="92" x2="580" y2="92"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" stroke-dasharray="3 3" />
  <!-- drops to each node -->
  <line x1="96"  y1="92" x2="96"  y2="112"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" stroke-dasharray="3 3" />
  <line x1="256" y1="92" x2="256" y2="112"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" stroke-dasharray="3 3" />
  <line x1="416" y1="92" x2="416" y2="112"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" stroke-dasharray="3 3" />
  <line x1="580" y1="92" x2="580" y2="112"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" stroke-dasharray="3 3" />

  <!-- ── Row 2: store ── -->
  <rect x="28" y="112" width="136" height="60" rx="8"
    fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5" />
  <text x="96" y="132" text-anchor="middle" dominant-baseline="central"
    fill="rgb(159,225,203)" font-size="14" font-weight="500">
    store.ts
  </text>
  <text x="96" y="153" text-anchor="middle" dominant-baseline="central"
    fill="rgb(93,202,165)" font-size="11">
    ordered stack · CRUD
  </text>

  <!-- ── Row 2: choropleth ── -->
  <rect x="188" y="112" width="136" height="60" rx="8"
    fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5" />
  <text x="256" y="132" text-anchor="middle" dominant-baseline="central"
    fill="rgb(159,225,203)" font-size="14" font-weight="500">
    choropleth
  </text>
  <text x="256" y="153" text-anchor="middle" dominant-baseline="central"
    fill="rgb(93,202,165)" font-size="11">
    fill-color ramp
  </text>

  <!-- ── Row 2: bubble ── -->
  <rect x="348" y="112" width="136" height="60" rx="8"
    fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5" />
  <text x="416" y="132" text-anchor="middle" dominant-baseline="central"
    fill="rgb(159,225,203)" font-size="14" font-weight="500">
    bubble
  </text>
  <text x="416" y="153" text-anchor="middle" dominant-baseline="central"
    fill="rgb(93,202,165)" font-size="11">
    circle-radius scale
  </text>

  <!-- ── Row 2: categorical ── -->
  <rect x="508" y="112" width="144" height="60" rx="8"
    fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5" />
  <text x="580" y="132" text-anchor="middle" dominant-baseline="central"
    fill="rgb(159,225,203)" font-size="14" font-weight="500">
    categorical
  </text>
  <text x="580" y="153" text-anchor="middle" dominant-baseline="central"
    fill="rgb(93,202,165)" font-size="11">
    color by category
  </text>

  <!-- ── Connectors: row 2 → row 3 ── -->
  <!-- store → layer-list (straight vertical, lands within layer-list bounds) -->
  <line x1="96" y1="172" x2="96" y2="240"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" />

  <!-- encodings → layer-editor (horizontal bus at y=214, then drop) -->
  <!-- choropleth: drop to bus, bus right to 504, then down -->
  <path d="M 256 172 L 256 214 L 504 214 L 504 240"
    fill="none" stroke="rgba(222,220,209,0.3)" stroke-width="1" />
  <!-- bubble: drop to bus -->
  <line x1="416" y1="172" x2="416" y2="214"
    stroke="rgba(222,220,209,0.3)" stroke-width="1" />
  <!-- categorical: drop to bus, then left to 504 -->
  <path d="M 580 172 L 580 214 L 504 214"
    fill="none" stroke="rgba(222,220,209,0.3)" stroke-width="1" />

  <!-- ── Row 3: LayerList ── -->
  <rect x="28" y="240" width="295" height="60" rx="8"
    fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5" />
  <text x="175" y="260" text-anchor="middle" dominant-baseline="central"
    fill="rgb(211,209,199)" font-size="14" font-weight="500">
    LayerList
  </text>
  <text x="175" y="281" text-anchor="middle" dominant-baseline="central"
    fill="rgb(180,178,169)" font-size="11">
    ordered stack editor · reorder
  </text>

  <!-- ── Row 3: LayerEditor ── -->
  <rect x="357" y="240" width="295" height="60" rx="8"
    fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5" />
  <text x="504" y="260" text-anchor="middle" dominant-baseline="central"
    fill="rgb(211,209,199)" font-size="14" font-weight="500">
    LayerEditor
  </text>
  <text x="504" y="281" text-anchor="middle" dominant-baseline="central"
    fill="rgb(180,178,169)" font-size="11">
    encoding config panel
  </text>

  <!-- ── Legend ── -->
  <rect x="28"  y="328" width="10" height="10" rx="2" fill="rgb(68,68,65)" />
  <text x="44"  y="333" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">types / components</text>

  <rect x="200" y="328" width="10" height="10" rx="2" fill="rgb(8,80,65)" />
  <text x="216" y="333" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">state / encoding</text>

  <text x="400" y="333" dominant-baseline="central" fill="rgb(194,192,182)" font-size="12">╌╌ type dependency</text>

</svg>
